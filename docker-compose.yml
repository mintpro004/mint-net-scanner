version: "3.9"
services:
  backend:
    build: ./backend
    container_name: mint-backend
    restart: unless-stopped
    network_mode: host
    cap_add: [NET_ADMIN, NET_RAW]
    ports: ["8000:8000"]
    environment: [PYTHONUNBUFFERED=1]
  frontend:
    image: nginx:alpine
    container_name: mint-frontend
    restart: unless-stopped
    ports: ["9000:80"]
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [backend]
